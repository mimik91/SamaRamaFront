<div class="calendar-container">
  <!-- Naglowek z wyborem serwisu -->
  <div class="calendar-top-bar">
    <div class="top-bar-left">
      <div class="service-selector" *ngIf="myServices.length > 1">
        <label for="service-select">{{ t('service_calendar.select_service') }}</label>
        <select
          id="service-select"
          [value]="selectedServiceId"
          (change)="onServiceChange($event)"
          [disabled]="isLoadingServices"
        >
          <option *ngFor="let service of myServices" [value]="service.id">
            {{ service.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="top-bar-center">
      <app-order-search
        *ngIf="selectedServiceId"
        [allOrders]="allOrdersForSearch"
        (filterChange)="onSearchFilterChange($event)"
      ></app-order-search>
    </div>

    <div class="top-bar-actions">
      <button
        class="btn-gear"
        (click)="showSettingsModal = true"
        [disabled]="isLoadingServices || !selectedServiceId"
        title="Ustawienia kalendarza"
        aria-label="Ustawienia kalendarza"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

  </div>

  <!-- Blad ladowania serwisow -->
  <div class="error-container" *ngIf="servicesError">
    <p class="error-message">{{ servicesError }}</p>
    <button class="btn-retry" (click)="loadMyServices()">
      {{ t('common.retry') }}
    </button>
  </div>

  <!-- Ladowanie -->
  <div class="loading-container" *ngIf="isLoadingServices && !servicesError">
    <div class="spinner"></div>
    <p>{{ t('service_calendar.loading') }}</p>
  </div>

  <!-- Glowna zawartosc kalendarza -->
  <div class="calendar-content" *ngIf="!isLoadingServices && !servicesError && selectedServiceId">

    <!-- Header kalendarza -->
    <app-calendar-header
      [currentView]="currentView"
      [calendarMode]="calendarMode"
      [selectedDate]="selectedDate"
      [maxBikesPerDay]="calendarConfig?.maxBikesPerDay || 10"
      (viewChange)="onViewChange($event)"
      (dateChange)="onDateChange($event)"
      (acceptReservationClick)="onAcceptReservationClick()"
      (acceptBikeClick)="onAcceptBikeClick()"
    ></app-calendar-header>

    <!-- Ladowanie danych -->
    <div class="loading-overlay" *ngIf="isLoadingData">
      <div class="spinner"></div>
    </div>

    <!-- Widok dnia -->
    <app-calendar-day-view
      *ngIf="currentView === 'day' && dayData"
      [data]="dayData"
      [calendarMode]="calendarMode"
      [technicians]="technicians"
      (orderClick)="onOrderClick($event)"
      (cancelOrder)="onCancelOrder($event)"
      (confirmOrder)="onConfirmOrder($event)"
      (acceptBike)="onAcceptBike($event)"
      (startProgress)="onStartProgress($event)"
      (markReadyForPickup)="onMarkReadyForPickup($event)"
      (markCompleted)="onMarkCompleted($event)"
      (backToProgress)="onBackToProgress($event)"
    ></app-calendar-day-view>

    <!-- Widok tygodnia -->
    <app-calendar-week-view
      *ngIf="currentView === 'week' && filteredWeekData"
      [data]="filteredWeekData!"
      [selectedDate]="selectedDate"
      [calendarMode]="calendarMode"
      [technicians]="technicians"
      [maxBikesPerDay]="calendarConfig?.maxBikesPerDay || 10"
      [isMobile]="isMobile"
      [mobileDays]="mobileDays"
      (orderClick)="onOrderClick($event)"
      (dayClick)="onDayClick($event)"
      (cancelOrder)="onCancelOrder($event)"
      (confirmOrder)="onConfirmOrder($event)"
      (acceptBike)="onAcceptBike($event)"
      (startProgress)="onStartProgress($event)"
      (markReadyForPickup)="onMarkReadyForPickup($event)"
      (markCompleted)="onMarkCompleted($event)"
      (backToProgress)="onBackToProgress($event)"
      (loadPreviousDays)="onLoadPreviousDays()"
      (loadNextDays)="onLoadNextDays()"
    ></app-calendar-week-view>

  </div>
</div>

<!-- Modal tworzenia zlecenia -->
<app-create-order-modal
  *ngIf="showCreateOrderModal"
  [serviceId]="selectedServiceId!"
  [preselectedDate]="preselectedDate"
  [technicians]="technicians"
  [calendarMode]="calendarMode"
  [mode]="createOrderMode"
  (close)="onCreateOrderClose()"
  (orderCreated)="onOrderCreated()"
></app-create-order-modal>

<!-- Modal szczegolów zlecenia -->
<app-order-details-modal
  *ngIf="showOrderDetailsModal && selectedOrder"
  [order]="selectedOrder"
  [serviceId]="selectedServiceId!"
  [technicians]="technicians"
  [calendarMode]="calendarMode"
  [reservationAvailable]="reservationAvailable"
  [transportAvailable]="transportAvailable"
  (close)="onOrderDetailsClose()"
  (orderUpdated)="onOrderUpdated()"
  (acceptBike)="onAcceptBikeFromDetails($event)"
></app-order-details-modal>

<!-- Modal przyjmowania roweru -->
<app-accept-bike-modal
  *ngIf="showAcceptBikeModal"
  [serviceId]="selectedServiceId!"
  [waitingOrders]="waitingForBikeOrders"
  [preselectedOrder]="preselectedOrderForAccept"
  (close)="onAcceptBikeModalClose()"
  (bikeAccepted)="onBikeAccepted()"
></app-accept-bike-modal>

<!-- Modal gotowości do odbioru -->
<app-mark-ready-modal
  *ngIf="showMarkReadyModal && markReadyOrder && selectedServiceId"
  [serviceId]="selectedServiceId"
  [order]="markReadyOrder"
  [siblingOrders]="markReadySiblings"
  (close)="onMarkReadyClose()"
  (completed)="onMarkReadyCompleted($event)"
></app-mark-ready-modal>

<!-- Modal ustawień kalendarza -->
<app-calendar-settings-modal
  *ngIf="showSettingsModal && selectedServiceId && calendarConfig"
  [serviceId]="selectedServiceId"
  [config]="calendarConfig"
  [transportAvailable]="transportAvailable"
  (close)="showSettingsModal = false"
  (configUpdated)="onSettingsUpdated($event)"
></app-calendar-settings-modal>
