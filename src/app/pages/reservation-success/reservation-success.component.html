<div class="success-container">
  <div class="success-card">
    <div class="checkmark">
      <svg viewBox="0 0 52 52" class="checkmark-svg">
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
    </div>

    <h1>Rezerwacja złożona!</h1>
    <p class="subtitle">Serwis skontaktuje się z Tobą wkrótce w celu potwierdzenia terminu.</p>

    <div class="actions">
      <button class="btn-primary" (click)="goToHomepage()">Strona główna</button>
      <button *ngIf="serviceSuffix" class="btn-secondary" (click)="goToServiceProfile()">Wróć do profilu serwisu</button>
    </div>
  </div>
</div>
