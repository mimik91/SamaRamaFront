<nav class="navbar" [ngClass]="{'auth-navbar': isAuthPage()}">
  <!-- Podstawowa wersja nawigacji (z przyciskiem hamburger) -->
  <div class="navbar-container" *ngIf="!isAuthPage()">
    <div class="navbar-brand">
      <a href="javascript:void(0)" (click)="navigateToHome($event)">
        <app-cyclopick-logo [height]="'44px'" [textSize]="'1.2rem'" [textColor]="'#FFFFFF'"></app-cyclopick-logo>
      </a>
    </div>

    <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
      <span class="hamburger-icon" [class.open]="mobileMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <div class="navbar-menu" [class.mobile-open]="mobileMenuOpen">

      <ng-container *ngIf="authService.isLoggedIn(); else notLoggedInMenu">

        <!-- Menu dla zalogowanych serwisów -->
        <ng-container *ngIf="authService.isService()">
          <a href="javascript:void(0)" (click)="navigateToProfileSettings($event)" class="nav-link nav-link--icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Ustawienia profilu
          </a>
          <a href="javascript:void(0)" (click)="navigateToKanban($event)" class="nav-link nav-link--icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="11" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
            Kanban
          </a>
          <a href="javascript:void(0)" (click)="navigateToServicePanel($event)" class="nav-link nav-link--icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Kalendarz
          </a>
          <a href="javascript:void(0)" (click)="navigateToServiceHistory($event)" class="nav-link nav-link--icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Historia zleceń
          </a>
          <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()" class="nav-link--icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
            Mapa
          </a>
        </ng-container>

        <!-- Menu dla zalogowanych klientów -->
        <ng-container *ngIf="authService.isClient() && !authService.hasAdminPrivileges()">
          <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()">Mapa</a>
          <a routerLink="/bicycles" routerLinkActive="active" (click)="closeMobileMenu()">Moje Rowery</a>
        </ng-container>

        <!-- Menu dla administratorów -->
        <ng-container *ngIf="authService.isAdmin()">
          <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()">Mapa</a>
          <a routerLink="/admin-dashboard" routerLinkActive="active" (click)="closeMobileMenu()">Dashboard</a>
          <a routerLink="/admin-orders" routerLinkActive="active" (click)="closeMobileMenu()">Zamówienia</a>
        </ng-container>

        <!-- Menu dla moderatorów -->
        <ng-container *ngIf="authService.isModerator()">
          <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()">Mapa</a>
          <a routerLink="/bicycles" routerLinkActive="active" (click)="closeMobileMenu()">Moje rowery</a>
          <a routerLink="/mistrzauta" routerLinkActive="active" (click)="closeMobileMenu()">Zlecenia na dziś</a>
          <a routerLink="/admin-orders" routerLinkActive="active" (click)="closeMobileMenu()">Zamówienia</a>
        </ng-container>

      </ng-container>

      <!-- Menu dla niezalogowanych -->
      <ng-template #notLoggedInMenu>
        <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()">Mapa</a>
        <a routerLink="/login" routerLinkActive="active" (click)="closeMobileMenu()">Login</a>
        <a routerLink="/register-service" routerLinkActive="active" (click)="closeMobileMenu()">Zarejestruj serwis</a>
      </ng-template>
    </div>

    <!-- User Settings Dropdown -->
    <app-user-settings *ngIf="authService.isLoggedIn()"></app-user-settings>
  </div>

  <!-- Wersja nawigacji dla stron logowania/rejestracji -->
  <div class="auth-navbar-container" *ngIf="isAuthPage()">
    <div class="navbar-brand">
      <a href="javascript:void(0)" (click)="navigateToHome($event)">
        <app-cyclopick-logo [height]="'44px'" [textSize]="'1.2rem'" [textColor]="'#FFFFFF'"></app-cyclopick-logo>
      </a>
    </div>

    <div class="auth-links">
      <!-- Menu dla strony logowania klienta -->
      <ng-container *ngIf="isLoginPage()">
        <!-- <a routerLink="/cennik" routerLinkActive="active">Cennik</a> -->
        <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()">Mapa</a>
        <a routerLink="/register-service" routerLinkActive="active" (click)="closeMobileMenu()">Zarejestruj serwis</a>
      </ng-container>

      <!-- Menu dla strony rejestracji klienta -->
      <ng-container *ngIf="isRegisterPage()">
        <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()">Mapa</a>
        <a routerLink="/login" routerLinkActive="active" (click)="closeMobileMenu()">Login</a>
        <a routerLink="/register-service" routerLinkActive="active" (click)="closeMobileMenu()">Zarejestruj serwis</a>
      </ng-container>

      <!-- Menu dla strony rejestracji serwisu -->
      <ng-container *ngIf="isServiceRegisterPage()">
        <a routerLink="/mapa-serwisow" routerLinkActive="active" (click)="closeMobileMenu()">Mapa</a>
        <a routerLink="/login" routerLinkActive="active" (click)="closeMobileMenu()">Login</a>
      </ng-container>
    </div>
  </div>

  <!-- Overlay dla menu mobilnego -->
  <div class="menu-overlay" *ngIf="mobileMenuOpen" (click)="closeMobileMenu()"></div>
</nav>
